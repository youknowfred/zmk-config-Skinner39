manifest:
  remotes:
    - name: zmk
      url-base: https://github.com/zmkfirmware
    - name: badjeff
      url-base: https://github.com/badjeff
    - name: zzeneg
      url-base: https://github.com/zzeneg
  projects:
    - name: zmk
      remote: zmk
      revision: 26246da1b69733b224a33d82b33750541cd5933a  # current ZMK main (post-HWMv2 / Zephyr 4.1) — re-pin to the green commit after CI passes
      import: app/west.yml
    - name: zmk-pmw3610-driver
      remote: badjeff
      revision: 44b4a76b74d293a93cec4ccb7e04cb8d29c10f93  # main / "zmk-0.4": pixart,pmw3610-alt + CONFIG_PMW3610_ALT_*
    - name: zmk-raw-hid
      remote: zzeneg
      revision: e25e325adc90fccb60cc08393b8c2b0ba6d647c7  # pinned HEAD ("pin zmk v0.3")
      # P0-6 (keysmith doc 03 §7): vendor raw-HID 0xFF60/0x61, 32-byte reports.
      # Its USB glue is the LEGACY hid_ops/usb_hid_register_device API — the SAME
      # stack ZMK core itself still uses at our zmk pin (app/src/usb_hid.c@26246da),
      # so the usbd-model port doc 03 §0 #8 anticipated is NOT needed yet; re-check
      # when zmk migrates to USB_DEVICE_STACK_NEXT. RAW_HID is Kconfig-gated to the
      # central and enabled LEFT-only via build.yaml cmake-args.
  self:
    path: config
# Dropped vs fw15 (now built into ZMK core, were breaking the build):
#   zmk-split-peripheral-input-relay  -> core `zmk,input-split`
#   zmk-input-behavior-listener       -> core `zmk,input-listener` + input-processors
#   zmk-lpm009m360a-driver            -> unused (display is nice_view)
