# Enable pointing device support  
CONFIG_ZMK_POINTING=y

# Enable SPI and INPUT for PMW3610
CONFIG_SPI=y
CONFIG_INPUT=y

# Enable PMW3610 driver (badjeff "-alt" fork, current ZMK)
CONFIG_PMW3610_ALT=y
CONFIG_PMW3610_ALT_SMART_ALGORITHM=y

# Optional: Add delay if you get "Incorrect product id" errors
# CONFIG_PMW3610_INIT_POWER_UP_EXTRA_DELAY_MS=300

# --- BLE link hardening (nRF52840, both halves) ---
# +8 dBm TX power (Zephyr default is 0 dBm). Raises link margin on the host
# (->Mac) link AND the left<->right split link; negligible battery cost for HID.
# Shared by both board siblings via id "skinner39" (skinner39.zmk.yml).
# ZMK connection-issues guide recommends this for nRF52840.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Force 1M PHY (disable 2M). More robust at range / in 2.4 GHz noise. Radio-level
# on BOTH halves, so it hardens the host (->Mac) link AND the left<->right split
# link. ZMK connection-issues guide recommends this for stability.
CONFIG_BT_CTLR_PHY_2M=n

# --- Split link resilience (CENTRAL/left only; depends on ZMK_SPLIT_ROLE_CENTRAL) ---
# Harden the left<->right link against brief RF blips. Stock latency=30 lets the
# peripheral skip up to 30 events, so a short glitch blows past the supervision
# timeout and drops the split -- which then can't auto-recover (upstream ZMK
# #718/#2776: central restarts scanning once, no retry). Lower latency + longer
# timeout = far fewer drops, so we hit the wedge far less often.
# latency was 30 (default), timeout was 400 (4s); raising timeout to 500 (5s).
CONFIG_ZMK_SPLIT_BLE_PREF_LATENCY=10
CONFIG_ZMK_SPLIT_BLE_PREF_TIMEOUT=500

# ===================== Trackball: T0 pointer tuning =====================
# Smooth (sub-line / high-res) scrolling. Pairs with the layer-7 scroll
# processor + &zip_scroll_scaler so scroll is continuous, not 1-line-notchy.
# Symbol verified present in app/src/pointing/Kconfig @ 26246da.
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# --- Guardrails (intentional NON-changes; documented so they aren't "tuned" by mistake) ---
# Report every motion frame for lowest latency. RAISING this BATCHES reports and the
# PMW3610 driver PURGES accumulated deltas on under-interval ticks => dropped motion.
# Leave at 0 (the default). Do NOT set it "to smooth BLE".
# CONFIG_PMW3610_ALT_REPORT_INTERVAL_MIN=0
# SPI stays at 2 MHz (datasheet fSCLK ceiling for the PMW3610); the 7-byte motion
# burst is already ~31 us — not a latency term. Do NOT raise spi-max-frequency.

# --- T0-F (STAGED, board-fragile): pin BLE intervals. Enable + VALIDATE separately. ---
# Pins the dominant latency terms (split R->L and host L->Mac) at the 7.5 ms BLE floor.
# This board has a known split-reconnect weakness (#718/#2776); validate that BOTH
# halves still reconnect after enabling. Moot if you run the LEFT half on USB (recommended).
# CONFIG_ZMK_SPLIT_BLE_PREF_INT=6          # split R<->L connection interval = 7.5 ms
# CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6      # host link (LEFT->Mac) 7.5 ms ...
# CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6      # ... pinned min==max so macOS can't drift to 15 ms
# CONFIG_BT_PERIPHERAL_PREF_LATENCY=0      # host link only (LEFT is not battery-critical)
# CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400
# Escape hatch: if you see reconnect loops or instability, relax MAX_INT to 12 (or revert).

# --- T1-E: custom 1-Euro processor needs the FPU (float math) + a bigger main stack ---
CONFIG_FPU=y
CONFIG_MAIN_STACK_SIZE=4096
# =======================================================================
