# SPDX-License-Identifier: MIT
# DRAFT — 1-Euro adaptive low-pass smoothing for relative pointer input (T1-E).
description: 1-Euro pointer smoothing input processor (DRAFT — compile + soak before use)

compatible: "zmk,input-processor-one-euro"

include: ip_zero_param.yaml   # zero-cell input processor base (#input-processor-cells = <0>)

properties:
  input-type:
    type: int
    default: 2   # INPUT_EV_REL
    description: Input event type to smooth (INPUT_EV_REL = 2).

  min-cutoff-milli:
    type: int
    default: 1000   # 1.0 Hz
    description: Minimum cutoff frequency in milli-Hz. Lower = more smoothing at rest, more lag.

  beta-milli:
    type: int
    default: 7
    description: Speed coefficient (milli). Higher = cutoff rises faster with speed = less lag on fast motion. Sweep {3,7,15}.

  d-cutoff-milli:
    type: int
    default: 1000   # 1.0 Hz
    description: Derivative cutoff frequency in milli-Hz.

  ema-only:
    type: boolean
    description: Use a fixed-alpha EMA instead of full 1-Euro. The simpler "A-arm" — try this first.

  ema-alpha-milli:
    type: int
    default: 400   # 0.4
    description: EMA weight (0..1000) for the new sample when ema-only is set.
