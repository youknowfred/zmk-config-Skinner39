# Enable nice!view
CONFIG_ZMK_DISPLAY=y
# Disable idle blanking
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=4096

# --- RIGHT-half battery visibility (central side; this shield is LEFT-only) ---
# FETCHING: the central subscribes the peripheral's Battery Service over the
# split link and raises zmk_peripheral_battery_state_changed events — the
# firmware-side source for the keysmith M11 guardrail and the TB-7 status
# channel. Cure-v2's subscription watchdog deliberately exempts the battery
# subscription, so this cannot flap the split link.
# PROXY: re-exposes the fetched level as an additional Battery Service instance
# toward the host, so macOS sees the RIGHT half natively.
# Effect is flash-gated. The proxy adds a GATT service: same Service-Changed
# forewarning class as the Glance HID service (bonds survive; BT off/on if the
# Mac acts confused after the flash).
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
