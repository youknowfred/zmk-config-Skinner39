name: Build ZMK firmware
on:
  workflow_dispatch:
  push:
    paths:
      - config/**
      - boards/**
      - build.yaml
      # The repo-root Zephyr module (2026-06-12): firmware code now also lives
      # in src/ + vendor/, glued by the root Kconfig/CMakeLists/zephyr-module.
      # A change there without this filter would ship unbuilt (it happened:
      # 9d822a2 triggered no run).
      - src/**
      - vendor/**
      - Kconfig
      - CMakeLists.txt
      - zephyr/**
      - .github/workflows/build.yml

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main
