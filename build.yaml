---
include:
  - board: skinner39_left/nrf52840/zmk
    shield: keysmith_glance
    snippet: studio-rpc-usb-uart
    # P0-6: raw-HID DISABLED pending the on-device blocker (2026-06-09 bisect):
    # with -DCONFIG_RAW_HID=y -DCONFIG_USB_HID_DEVICE_COUNT=2 the full build
    # crashes at boot (widget) AND even widget-less the USB stack wedges ~60 s
    # after enumerating, replug unrecoverable, endpoint selection poisoned.
    # Next attempt is BLE-first (the module's hog.c GATT path, USB transport
    # off) — see keysmith tracker §5 P0-6. Do not re-add the flags as-is.
  - board: skinner39_right/nrf52840/zmk
    shield: nice_view
  # --- LEFT diagnostic build (USB logging) — 2026-06-11 soak instrumentation ---
  # Identical firmware to the main LEFT build EXCEPT: snippet studio-rpc-usb-uart
  # is replaced by zmk-usb-logging (the CDC port becomes a log console; ZMK Studio
  # unavailable while flashed) at log level INF — the "flight recorder". The
  # connection-lifecycle lines are promoted to INF in the fork so this captures
  # the reconnect story at near-zero volume. The INF level is pinned INSIDE the
  # fork's snippet conf (a96127a7) — per-entry cmake-args silently failed to set
  # it (a DBG artifact shipped; verify artifacts with `strings`, see docs §5).
  # ⚠ Do NOT run this board's USB logging at DBG: DBG saturates the legacy USB
  # stack's CDC under trackball motion, the device falls off the bus mid-write,
  # and the macOS port can LATCH disabled (power, no data) until cleared — same
  # fragility class as the raw-HID P0-6 wedge.
  # Capture rig: tools/split-log-capture.sh (installed at ~/Documents/skinner39/).
  - board: skinner39_left/nrf52840/zmk
    shield: keysmith_glance
    snippet: zmk-usb-logging
    artifact-name: skinner39_left_USB_LOGGING
  # --- Settings-reset firmware (safety net — central/left half) ---
  # Drag the *settings_reset* UF2 onto the 'keyball' bootloader drive to wipe the
  # central's stored settings (BT bonds + any ZMK Studio keymap overlay), then
  # re-flash the normal left firmware.
  # (Right/peripheral settings_reset is intentionally omitted: under the minimal
  #  settings_reset shield the PMW3610 trackball driver fails to instantiate.)
  - board: skinner39_left/nrf52840/zmk
    shield: settings_reset
  # --- RIGHT bond-clear firmware (safety net — peripheral half) ---
  # The RIGHT-half counterpart of settings_reset, done the only way that works
  # here: the NORMAL right shield + CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=y
  # (settings_reset would kill the PMW3610 — see the note above). Flash once,
  # boot to clear the stale split bond, then re-flash the normal right
  # firmware. Drives the Repair wizard's asymmetric bond-reset playbook
  # (was the one-off `clear-bonds-right` branch; folded into main 2026-06-09).
  - board: skinner39_right/nrf52840/zmk
    shield: nice_view
    cmake-args: -DCONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=y
    artifact-name: skinner39_right_CLEAR_BONDS

